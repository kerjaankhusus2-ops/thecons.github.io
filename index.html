<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thecons Digital | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        /* Gaya Navigasi Baru */
nav {
    background-color: #ffffff; /* Warna putih agar bersih */
    padding: 20px 0;
    border-bottom: 4px solid #d4af37; /* Garis emas di bawah seperti di gambar */
    display: flex;
    justify-content: center; /* Menu di tengah */
}

nav ul {
    list-style: none;
    display: flex;
    margin: 0;
    padding: 0;
    gap: 30px; /* Jarak antar menu */
}

nav ul li a {
    text-decoration: none;
    color: #333333; /* Warna teks gelap */
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px; /* Jarak antar huruf */
    text-transform: uppercase; /* Paksa huruf jadi KAPITAL */
    transition: 0.3s;
}

nav ul li a:hover {
    color: #d4af37; /* Berubah jadi emas saat disentuh */
}

/* Gaya dropdown sederhana untuk menu 'APP' */
.dropdown {
    cursor: pointer;
}

.dropdown::after {
    content: ' ▾';
    font-size: 10px;
}

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Thecons.</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">about</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Thecons Digital</h1>
        <p>Membangun masa depan digital yang lebih keren.</p>
        <a href="#" class="btn">Mulai Sekarang</a>
    </div>
 
</body>
</html>
